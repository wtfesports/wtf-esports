<!DOCTYPE html>
<html>
<head>
<title>Book Slot | WTF Esports</title>
<link rel="stylesheet" href="2.1style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
}

/* HEADER */

header{
padding:20px 60px;
background:#111;
text-align:center;
}

.logo{
font-size:24px;
color:#00f7ff;
font-weight:bold;
margin-bottom:10px;
}

nav{
margin-bottom:20px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

nav a:hover{
color:#00f7ff;
}

header h1{
font-size:40px;
color:gold;
text-shadow:0 0 20px gold;
margin-top:10px;
}

/* FORM */

.form-section{
display:flex;
justify-content:center;
padding:40px;
}

form{
width:500px;
}

.row{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
flex:1;
display:flex;
flex-direction:column;
}

input,select{
padding:10px;
margin-top:5px;
border:none;
border-radius:4px;
}

button{
padding:10px 20px;
background:#00f7ff;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

/* BUTTONS */

.login-btn{
background:#00f7ff;
color:black;
padding:8px 14px;
border-radius:5px;
}

.admin-btn{
background:#ff4747;
padding:8px 14px;
border-radius:5px;
}

.admin-btn:hover{
background:#ff2a2a;
}
</style>

</head>

<body>

<header class="main-header">

<div class="logo">🎮 WTF ESPORTS</div>

<nav class="menu">

<a href="index2.1.html">Home</a>
<a href="booking2.1.html">Tournament</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="bracket.html">Bracket</a>
<a href="rules.html">Rules</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>

<a href="player-login2.1.html" class="login-btn">Player Login</a>
<a href="admin2.1.html" class="admin-btn">Admin</a>

</nav>

<h1>Book Your Slot</h1>

</header>

<div id="slotInfo" style="text-align:center;margin-top:20px;color:yellow;"></div>

<section class="form-section">

<form onsubmit="event.preventDefault(); saveData();">

<div class="row">

<div class="box">
<label>Team Name</label>
<input type="text" id="teamName" required>
</div>

<div class="box">
<label>Leader Name</label>
<input type="text" id="leaderName" required>
</div>

</div>

<div class="row">

<div class="box">
<label>Mobile Number</label>
<input type="text" id="mobile" required>
</div>

<div class="box">
<label>Game</label>
<select id="game" required>
<option value="">Select Game</option>
<option value="BGMI">BGMI</option>
<option value="Free Fire">Free Fire</option>
</select>
</div>

</div>

<div class="row">

<div class="box">
<label>Payment Mode</label>
<select id="paymentMode">
<option value="">Select Payment</option>
<option value="GPay">GPay</option>
<option value="PhonePe">PhonePe</option>
<option value="Paytm">Paytm</option>
<option value="UPI">UPI</option>
</select>
</div>

<div class="box">
<label>Team UID</label>
<input type="text" id="teamUID">
</div>

</div>

<label>Upload Payment Screenshot</label>
<input type="file" id="payment">

<button type="submit">Submit</button>

</form>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyBQWMagDvKjFSYaX-0ex2gGYT2AaucSIV8",
authDomain: "wtf-esports-victory-start-here.firebaseapp.com",
projectId: "wtf-esports-victory-start-here",
storageBucket: "wtf-esports-victory-start-here.firebasestorage.app",
messagingSenderId: "987957320998",
appId: "1:987957320998:web:f2211adc9f99d55f60f5e7"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);


window.saveData = async function(){

var teamName=document.getElementById("teamName").value;
var leaderName=document.getElementById("leaderName").value;
var mobile=document.getElementById("mobile").value;

if(mobile.length != 10){
alert("Enter valid 10 digit mobile number");
return;
}

var game=document.getElementById("game").value;
var teamUID=document.getElementById("teamUID").value;

if(teamName===""||leaderName===""||mobile===""||game===""){
alert("Please fill all details");
return;
}


var players=JSON.parse(localStorage.getItem("players"))||[];
var maxSlots=30;


for(let i=0;i<players.length;i++){
if(players[i].mobile===mobile){
alert("This mobile number already registered!");
return;
}
}


if(players.length>=maxSlots){
alert("Slots are full! Registration closed.");
return;
}


const file=document.getElementById("payment").files[0];
let screenshotURL="";

try{

if(file){

const storageRef = ref(storage,"payments/"+Date.now()+"_"+file.name);

await uploadBytes(storageRef,file);

screenshotURL = await getDownloadURL(storageRef);

}

}catch(error){

console.log("Screenshot upload error:",error);

}


var playerID="WTF"+Math.floor(1000+Math.random()*9000);
var username=leaderName.toLowerCase().replace(/\s/g,"")+Math.floor(Math.random()*100);
var password=Math.floor(100000+Math.random()*900000);


players.push({
id:playerID,
team:teamName,
leader:leaderName,
mobile:mobile,
game:game,
teamUID:teamUID,
teamNumber:players.length+1,
username:username,
password:password,
paymentScreenshot:screenshotURL
});

localStorage.setItem("players",JSON.stringify(players));


try{

await addDoc(collection(db,"players"),{
team:teamName,
leader:leaderName,
mobile:mobile,
game:game,
teamUID:teamUID,
username:username,
password:password,
paymentScreenshot:screenshotURL,
status:"Pending"
});

}catch(error){

console.log("Firestore save error:",error);

}


alert("Registration Successful!\n\nID: "+playerID+
"\nUsername: "+username+
"\nPassword: "+password);

window.location.href="player-login2.1.html";

}


var players=JSON.parse(localStorage.getItem("players"))||[];
var maxSlots=30;

document.getElementById("slotInfo").innerHTML=
"Slots Remaining: "+(maxSlots-players.length);

</script>

</body>
</html>
