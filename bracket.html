    /* HEADER */

.main-header{

<body>

<h1>🏆 Tournament Brackets</h1>

<div id="brackets"></div>

<button onclick="generateBracket()">Generate Matches</button>

<script>

function generateBracket(){

let players = JSON.parse(localStorage.getItem("players")) || [];

let container = document.getElementById("brackets");

container.innerHTML="";

for(let i=0;i<players.length;i+=2){

let team1 = players[i] ? players[i].team : "Waiting...";
let team2 = players[i+1] ? players[i+1].team : "Waiting...";

container.innerHTML += `

<div class="match">

<div class="team">${team1}</div>

<div class="vs">VS</div>

<div class="team">${team2}</div>

</div>

`;

}

}

</script>
